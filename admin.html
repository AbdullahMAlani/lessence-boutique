<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'ESSENCE | Executive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --text: #ffffff; --border: #222222; --surface: #0a0a0a; --muted: #666666; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 50px; }
        .brand-font { font-family: 'Jost', sans-serif; text-transform: uppercase; letter-spacing: 5px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; text-align: center; }
        .stat-value { font-size: 3rem; font-family: 'Jost', sans-serif; font-weight: 300; margin: 10px 0; }
        .stat-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        th { font-family: 'Jost', sans-serif; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
        .status-badge { background: #4caf50; color: #000; padding: 4px 10px; font-size: 0.6rem; letter-spacing: 1px; font-weight: bold; border-radius: 20px; }
    </style>
</head>
<body>

    <h1 class="brand-font" style="text-align: center; margin-bottom: 50px;">Executive Dashboard</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Visitors</div>
            <div class="stat-value" id="val-visitors">...</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value" id="val-orders">...</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Gross Revenue</div>
            <div class="stat-value" id="val-revenue">...</div>
        </div>
    </div>

    <h2 class="brand-font" style="font-size: 1.2rem; margin-bottom: 20px;">Recent Dispatch Log</h2>
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Client Name</th>
                <th>Date & Time</th>
                <th>Value</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="order-table-body">
            </tbody>
    </table>

   <script>
        window.addEventListener('DOMContentLoaded', async () => {
            // Ask for the password as soon as the page opens
            const pwd = prompt("L'ESSENCE SECURITY: Enter Master Password");
            
            if (!pwd) {
                document.body.innerHTML = "<h1 style='text-align:center; padding:100px;'>ACCESS DENIED</h1>";
                return;
            }

            try {
                // Send the password to the server
                const response = await fetch('https://lessence-backend.onrender.com/api/admin/stats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                
                const data = await response.json();

                if (data.status === "success") {
                    document.getElementById('val-visitors').innerText = data.total_visitors;
                    document.getElementById('val-orders').innerText = data.total_orders;
                    document.getElementById('val-revenue').innerText = data.total_revenue + '/-';

                    const tbody = document.getElementById('order-table-body');
                    tbody.innerHTML = data.recent_orders.map(order => `
                        <tr>
                            <td style="font-family: monospace; color: #aaa;">${order.order_id}</td>
                            <td>${order.customer_name}</td>
                            <td style="color: var(--muted);">${order.timestamp}</td>
                            <td>${order.total_value}/-</td>
                            <td><span class="status-badge">DISPATCHED</span></td>
                        </tr>
                    `).join('');
                } else {
                    alert("Authentication Failed.");
                    document.body.innerHTML = "<h1 style='text-align:center; padding:100px;'>ACCESS DENIED</h1>";
                }
            } catch (error) {
                alert("Server connection failed.");
            }
        });
    </script>
</body>
</html>
